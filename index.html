<!DOCTYPE html>
<html>
<head>
  <title>Geo Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; }
    #map { height: calc(100vh - 80px); width: 100%; }

    #controls {
      height: 80px;
      background: #16213e;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .layer-btn {
      padding: 10px 20px;
      border: 3px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      color: white;
      transition: all 0.2s;
      opacity: 0.75;
    }
    #btn-road { background: #c0392b; }
    #btn-ndvi { background: #27ae60; }
    #btn-node { background: #2980b9; }

    .layer-btn.active {
      opacity: 1;
      border-color: #ffffff;
      box-shadow: 0 0 12px rgba(255,255,255,0.5);
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <div id="controls">
    <button class="layer-btn" id="btn-road">🚗 Road Network Analysis</button>
    <button class="layer-btn" id="btn-ndvi">🌿 NDVI Vegetation Analysis</button>
    <button class="layer-btn" id="btn-node">📍 Node Mapping</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
  <script>

    // ── MAP SETUP ──────────────────────────────────────────────
    var map = L.map('map').setView([12.9835, 77.7427], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);


    // ── LAYER GROUPS (one per button) ──────────────────────────
    const groups = {
      road: L.layerGroup().addTo(map),
      ndvi: L.layerGroup().addTo(map),
      node: L.layerGroup().addTo(map)
    };

    // ── DEFAULT STYLES ─────────────────────────────────────────
    const defaultStyles = {
      road: { color: '#e74c3c', weight: 2.5, opacity: 0.8, fillOpacity: 0.3 },
      ndvi: { color: '#27ae60', weight: 1.5, fillColor: '#2ecc71', fillOpacity: 0.35 },
      node: { color: '#2980b9', weight: 2, opacity: 0.8 }
    };

    // ── HIGHLIGHTED STYLES (when button is active) ─────────────
    const highlightStyles = {
      road: { color: '#ff0000', weight: 4.5, opacity: 1 },
      ndvi: { color: '#00ff00', weight: 3,   opacity: 1, fillOpacity: 0.6 },
      node: { color: '#00aaff', weight: 4,   opacity: 1 }
    };

    // ── POINT STYLES ───────────────────────────────────────────
    const pointStyles = {
      default: { radius: 6,  fillColor: '#3498db', color: '#fff', weight: 1, fillOpacity: 0.85 },
      highlight:{ radius: 9, fillColor: '#00aaff', color: '#fff', weight: 2, fillOpacity: 1    }
    };


    // ── STRIP CRS (QGIS export fix) ────────────────────────────
    function clean(data) {
      delete data.crs;
      return data;
    }


    // ── LOAD GEOJSON INTO A GROUP ──────────────────────────────
    function loadIntoGroup(url, groupKey) {
      fetch(url)
        .then(res => {
          if (!res.ok) throw new Error(`404: ${url}`);
          return res.json();
        })
        .then(data => {
          data = clean(data);
          const style = defaultStyles[groupKey];

          const layer = L.geoJSON(data, {
            style: style,

            pointToLayer: function(feature, latlng) {
              return L.circleMarker(latlng, pointStyles.default);
            },

            onEachFeature: function(feature, layer) {
              const props = feature.properties;
              if (props) {
                const label = props.name || props.id || props.NAME || JSON.stringify(props);
                layer.bindPopup(String(label));
              }
            }
          });

          groups[groupKey].addLayer(layer);
          console.log(`✅ Loaded: ${url}`);
        })
        .catch(err => console.error(`❌ Failed: ${err.message}`));
    }


    // ── LOAD ALL LAYERS ON PAGE LOAD ───────────────────────────
    // Road lines
    ['data/whitefield_line.geojson',
     'data/whitefield_line2.geojson',
     'data/whitefield_line3.geojson',
     'data/whitefield_line4.geojson',
     'data/whitefield_line5.geojson'
    ].forEach(f => loadIntoGroup(f, 'road'));

    // NDVI / Area polygon
    loadIntoGroup('data/whitefield.geojson', 'ndvi');

    // Nodes / Points
    ['data/loc1.geojson',
     'data/depot.geojson',
     'data/deport_point.geojson'
    ].forEach(f => loadIntoGroup(f, 'node'));


    // ── HIGHLIGHT ON BUTTON CLICK ──────────────────────────────
    let activeKey = null;

    function setHighlight(key, on) {
      groups[key].eachLayer(function(geoLayer) {
        // geoLayer is the L.geoJSON inside the group
        if (geoLayer.setStyle) {
          geoLayer.setStyle(on ? highlightStyles[key] : defaultStyles[key]);
        }
        // for circleMarkers (points)
        geoLayer.eachLayer && geoLayer.eachLayer(function(inner) {
          if (inner.setStyle) {
            inner.setStyle(on ? pointStyles.highlight : pointStyles.default);
          }
        });
      });
    }

    function handleBtn(key, btn) {
      // If same button clicked again → unhighlight
      if (activeKey === key) {
        setHighlight(key, false);
        btn.classList.remove('active');
        activeKey = null;
        return;
      }

      // Unhighlight previous
      if (activeKey) {
        setHighlight(activeKey, false);
        document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
      }

      // Highlight new
      setHighlight(key, true);
      btn.classList.add('active');
      activeKey = key;
    }

    document.getElementById('btn-road').addEventListener('click', function() {
      handleBtn('road', this);
    });
    document.getElementById('btn-ndvi').addEventListener('click', function() {
      handleBtn('ndvi', this);
    });
    document.getElementById('btn-node').addEventListener('click', function() {
      handleBtn('node', this);
    });

  </script>
</body>
</html>
